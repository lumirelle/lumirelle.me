[build]
base = "trick-netlify/"
publish = "../dist"
command = "cd ../ && mise run build"

[build.environment]
NODE_VERSION = "26.5.0"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "https://lumirelle.netlify.app/*"
to = "https://lumirelle.me/:splat"
status = 302
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
